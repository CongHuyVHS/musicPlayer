<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="background"></div>

  <div class="player">
    <div class="window-controls">
      <button class="close-btn" onclick="closeApp()">✕</button>
    </div>
    <div class="song-art"></div>
    <div class="song-info">
      <h2 id="title">Ghost duet</h2>
      <p id="artist">Louie Zong</p>
    </div>

    <div class="controls">
        <div class="prev-button" onclick="prevSong()">
            <img src="img/back.png" alt="Previous" />
        </div>
        <div class="play-button" onclick="playPauseSong()">
            <img src="img/continue.png" alt="Play/Pause" id="play-pause-icon" />
        </div>
        <div class="next-button" onclick="nextSong()">
            <img src="img/next.png" alt="Next" />
        </div>
    </div>
        <div class="slider_container">
          <i class="fa fa-volume-down"></i>
      <input type="range" min="1" max="100"
        value="99" class="volume_slider" onchange="setVolume()">
      <i class="fa fa-volume-up"></i>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
